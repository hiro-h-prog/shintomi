name: 防衛関連サイト スクレイピング

on:
  schedule:
    - cron: "0 3 * * *"    # 12:00 JST
    - cron: "0 9 * * *"    # 18:00 JST
    - cron: "0 14 * * *"   # 23:00 JST
  workflow_dispatch:

jobs:
  scrape:
    runs-on: self-hosted
    timeout-minutes: 45    # 💡 待機時間が最大30分加わるため、タイムアウトを20分から45分に延長

    steps:
      - name: 実行時間をランダムに遅延（最大30分 / 1800秒）
        if: github.event_name == 'schedule'  # 💡 手動実行（workflow_dispatch）時はスリープをスキップ
        shell: bash
        run: |
          # 0〜1800秒（30分）のランダムな数値を生成
          DELAY=$(( RANDOM % 1801 ))
          echo "防衛省サイトへの配慮のため、${DELAY}秒間待機します..."
          sleep $DELAY

      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: Playwright Chromium をインストール
        run: playwright install chromium --with-deps

      - name: スクレイピング実行
        env:
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python scrape.py
